<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Entry Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styling for the Pandas HTML table injection */
        table { border-collapse: collapse; width: 100%; }
        th { background-color: #f3f4f6; font-weight: 600; padding: 12px; border-bottom: 2px solid #e5e7eb; color: #374151;}
        td { padding: 12px; border-bottom: 1px solid #e5e7eb; color: #4b5563;}
        tr:hover { background-color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900">

    <div class="max-w-5xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-600 tracking-tight">DataMaster AI</h1>
            <p class="mt-3 text-lg text-gray-500">Upload messy images, PDFs, csv, json, or spreadsheets. We clean and organize it instantly.</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
            <form id="uploadForm" class="flex flex-col items-center">
                <label class="w-full flex flex-col items-center px-4 py-6 bg-white text-blue rounded-lg shadow-inner tracking-wide uppercase border border-blue cursor-pointer hover:bg-blue-50 hover:text-blue-600 transition duration-300 border-dashed border-2 border-gray-300">
                    <svg class="w-10 h-10 text-blue-500" fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                        <path d="M16.88 9.1A4 4 0 0 1 16 17H5a5 5 0 0 1-1-9.9V7a3 3 0 0 1 4.52-2.59A4.98 4.98 0 0 1 17 8c0 .38-.04.74-.12 1.1zM11 11h3l-4-4-4 4h3v3h2v-3z" />
                    </svg>
                    <span class="mt-2 text-base leading-normal text-gray-600 font-semibold">Select a file (Image, PDF, CSV, Excel)</span>
                    <input type='file' id="fileInput" class="hidden" accept=".png, .jpg, .jpeg, .pdf, .csv, .xlsx, .xls, .json" />
                </label>
                <div id="fileNameDisplay" class="mt-3 text-sm text-gray-500 font-medium"></div>
                
                <button type="submit" id="processBtn" class="mt-6 w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-300 disabled:opacity-50">
                    Process & Clean Data
                </button>
            </form>

            <div id="loading" class="hidden mt-6 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <p class="mt-2 text-blue-600 font-medium">AI is analyzing and organizing your data...</p>
            </div>
            
            <div id="errorMsg" class="hidden mt-6 bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded"></div>
        </div>

        <div id="resultSection" class="hidden bg-white rounded-xl shadow-lg p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Cleaned Data Preview</h2>
                
                <div class="flex space-x-3">
                    <button onclick="downloadData('csv')" class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg shadow transition duration-300 flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Export CSV
                    </button>
                    <button onclick="downloadData('excel')" class="bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg shadow transition duration-300 flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Export Excel
                    </button>
                </div>
            </div>
            
            <div id="tableContainer" class="overflow-x-auto border border-gray-200 rounded-lg max-h-96 overflow-y-auto">
                </div>
        </div>

    </div>

    <script>
        let globalJsonData = []; // Store the data for downloading

        // Display selected filename
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || "No file selected";
            document.getElementById('fileNameDisplay').textContent = "Selected: " + fileName;
        });

        // Handle Form Submission
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                alert('Please select a file first.');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // UI Updates: Show loading, hide old results/errors
            document.getElementById('processBtn').disabled = true;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('errorMsg').classList.add('hidden');

            try {
                // Send file to Python backend
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                } else {
                    // Success! Render table and store JSON
                    document.getElementById('tableContainer').innerHTML = data.table;
                    globalJsonData = data.json_data;
                    document.getElementById('resultSection').classList.remove('hidden');
                }
            } catch (err) {
                showError("Server error. Please try again.");
            } finally {
                // UI Updates: Hide loading, enable button
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('processBtn').disabled = false;
            }
        });

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = "Error: " + msg;
            errorDiv.classList.remove('hidden');
        }

        // Handle Downloading via Backend
        async function downloadData(format) {
            if (globalJsonData.length === 0) return;

            const response = await fetch('/export', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: globalJsonData, format: format })
            });

            if (response.ok) {
                // Magically handle file download in browser
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = format === 'excel' ? 'Cleaned_Data.xlsx' : 'Cleaned_Data.csv';
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } else {
                alert("Failed to export data.");
            }
        }
    </script>
</body>
</html>
